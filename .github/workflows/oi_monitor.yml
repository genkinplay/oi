name: OI Monitor

on:
  workflow_dispatch: # allow manual trigger

# 同一时间只允许一个实例在跑；上一次跑完前来的新 dispatch 会等待，而不是取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # Restore dedup state from previous run so we don't re-alert
      # within the dedup window (default 1h). Cache key rotates daily
      # so state resets cleanly each day.
      - name: Restore dedup cache
        uses: actions/cache@v4
        with:
          path: /tmp/oi_dedup.json
          key: oi-dedup-${{ github.run_id }}
          restore-keys: |
            oi-dedup-

      - name: Run OI Monitor
        env:
          # 多渠道 webhook（任意一个或多个；多个用逗号分隔，可放在 secret 里）
          WEBHOOK_URL: ${{ secrets.OI_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URLS: ${{ secrets.FEISHU_WEBHOOK_URLS }}
          DINGTALK_WEBHOOK_URLS: ${{ secrets.DINGTALK_WEBHOOK_URLS }}
          # DeepSeek（不配则跳过 AI 分析）
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          # Cloudflare Worker 代理（绕开币安 451 屏蔽）；未配置则直连 fapi
          BINANCE_FAPI_BASE: ${{ vars.BINANCE_FAPI_BASE }}
          BINANCE_PROXY_SECRET: ${{ secrets.BINANCE_PROXY_SECRET }}
          THRESHOLD_PCT: ${{ vars.OI_THRESHOLD_PCT || '10' }}
          TOP_N: ${{ vars.OI_TOP_N || '50' }}
          PERIOD: ${{ vars.OI_PERIOD || '5m' }}
          DEDUP_WINDOW_SEC: ${{ vars.OI_DEDUP_WINDOW_SEC || '1800' }}
          DEDUP_FILE: /tmp/oi_dedup.json
        run: python scripts/oi_monitor.py
